name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forge
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U forge -d forge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FORGE_TEST_DATABASE_URL: postgres://forge:forge@127.0.0.1:5432/forge?sslmode=disable
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test -count=1 ./...
